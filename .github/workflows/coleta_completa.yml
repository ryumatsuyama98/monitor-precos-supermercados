name: Coleta Completa

on:
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Coletar todas as categorias
        run: python scraper/scraper.py Cervejas Carnes Biscoitos Massas Mercearia
      - name: Gerar dashboard
        run: python scraper/gerar_dashboard.py
      - name: Commit e push
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          cp data/precos.db /tmp/precos_local.db
          cp docs/index.html /tmp/index_local.html
          cp data/coleta.log /tmp/coleta_local.log 2>/dev/null || true
          TODAY=$(date +%Y-%m-%d)
          cp data/coleta_$TODAY.csv /tmp/coleta_csv_local.csv 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/precos_local.db data/precos.db
          cp /tmp/index_local.html docs/index.html
          cp /tmp/coleta_local.log data/coleta.log 2>/dev/null || true
          cp /tmp/coleta_csv_local.csv data/coleta_$TODAY.csv 2>/dev/null || true
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Coleta completa: $(date '+%d/%m/%Y %H:%M')"
          git push origin main
