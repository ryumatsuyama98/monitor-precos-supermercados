name: Coleta Biscoitos+Massas

on:
  schedule:
    - cron: '0 5 * * *'  # BRT -3h
  workflow_dispatch:

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Coletar Biscoitos+Massas
        run: python scraper/scraper.py Biscoitos Massas
      - name: Gerar dashboard
        run: python scraper/gerar_dashboard.py
      - name: Commit e push (merge seguro)
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          # Salva os arquivos gerados localmente
          cp data/precos.db /tmp/precos_local.db
          cp docs/index.html /tmp/index_local.html
          cp data/coleta.log /tmp/coleta_local.log 2>/dev/null || true
          TODAY=$(date +%Y-%m-%d)
          cp data/coleta_$TODAY.csv /tmp/coleta_csv_local.csv 2>/dev/null || true
          # Puxa o estado mais recente do remoto (descarta conflitos)
          git fetch origin main
          git reset --hard origin/main
          # Restaura os arquivos locais por cima
          cp /tmp/precos_local.db data/precos.db
          cp /tmp/index_local.html docs/index.html
          cp /tmp/coleta_local.log data/coleta.log 2>/dev/null || true
          cp /tmp/coleta_csv_local.csv data/coleta_$TODAY.csv 2>/dev/null || true
          # Commit e push
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Biscoitos+Massas: $(date '+%d/%m/%Y %H:%M')"
          git push origin main
