name: Limpar Banco (executar uma vez)

on:
  workflow_dispatch:

jobs:
  limpar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Limpar banco
        run: python scraper/limpar_banco.py
      - name: Gerar dashboard atualizado
        run: python scraper/gerar_dashboard.py
      - name: Commit
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Limpeza: remove Carrefour e SKUs Atacadão"
          git push
