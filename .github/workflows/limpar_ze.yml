name: Limpar Zé Delivery

on:
  workflow_dispatch:

jobs:
  limpar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Limpar registros Zé Delivery
        run: python scraper/limpar_ze.py
      - name: Gerar dashboard atualizado
        run: python scraper/gerar_dashboard.py
      - name: Commit e push
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          cp data/precos.db /tmp/precos_local.db
          cp docs/index.html /tmp/index_local.html
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/precos_local.db data/precos.db
          cp /tmp/index_local.html docs/index.html
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Remove Zé Delivery do banco"
          git push origin main
