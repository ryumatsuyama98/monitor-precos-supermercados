name: Coleta Diária de Preços

on:
  schedule:
    - cron: '0 10 * * *'  # Todo dia às 07:00 horário de Brasília (10:00 UTC)
  workflow_dispatch:       # Permite rodar manualmente pelo GitHub

jobs:
  coletar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install playwright beautifulsoup4 requests sqlite-utils openpyxl
          playwright install chromium --with-deps

      - name: Rodar scraper
        run: python scraper/scraper.py

      - name: Gerar dashboard
        run: python scraper/gerar_dashboard.py

      - name: Salvar resultados no repositório
        run: |
          git config user.name "Monitor Bot"
          git config user.email "bot@monitor-precos.local"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "Coleta: $(date '+%d/%m/%Y %H:%M')"
          git push
