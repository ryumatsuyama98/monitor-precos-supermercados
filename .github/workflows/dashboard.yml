name: Atualizar Dashboard

on:
  workflow_dispatch:  # disparo manual pelo GitHub Actions

jobs:
  dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerar dashboard
        run: python scraper/gerar_dashboard.py

      - name: Commit e push do dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "dashboard: atualiza visual [$(date '+%Y-%m-%d %H:%M')]"
          git push
