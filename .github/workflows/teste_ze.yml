name: Teste Zé Delivery

on:
  workflow_dispatch:

jobs:
  teste:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rodar teste
        env:
          ZE_COOKIES: ${{ secrets.ZE_COOKIES }}
        run: python scraper/teste_ze.py
